<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>НеХалат — Одежда с принтами для врачей</title>
  <meta name="description" content="НеХалат — стильная одежда с медицинскими и ветеринарными принтами. Футболки и худи для тех, кто гордится профессией." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            brand: { 50:'#eff5ff', 100:'#dbeafe', 200:'#bfdbfe', 300:'#93bbfd', 400:'#6096f8', 500:'#3b6ef3', 600:'#1652a0', 700:'#1a4a8a', 800:'#1b3d70', 900:'#1c355e' }
          }
        }
      }
    }
  </script>
  <style>
    html { scroll-behavior: smooth; }
    .card-overlay { opacity:0; transition: opacity .25s; }
    .group:hover .card-overlay { opacity:1; }
    .color-dot { width:14px; height:14px; border-radius:50%; border:1.5px solid #ddd; display:inline-block; cursor:pointer; transition: transform .15s; }
    .color-dot:hover { transform: scale(1.25); }
  </style>
</head>
<body class="font-sans text-gray-800 bg-white">

  <!-- Top Banner -->
  <div id="top-banner" class="bg-brand-600 text-white text-center text-xs py-2 tracking-wide"></div>

  <!-- Header -->
  <header class="sticky top-0 z-50 bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 lg:px-8">
      <!-- Top row: logo + phone + icons -->
      <div class="flex items-center justify-between h-14 lg:h-16">
        <a href="#" class="shrink-0"><img id="header-logo" alt="НеХалат" class="h-8 lg:h-10" /></a>

        <div class="hidden lg:flex items-center gap-6">
          <a id="header-phone" href="#" class="text-sm text-gray-600 hover:text-brand-600 transition-colors flex items-center gap-1.5">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            <span id="phone-text"></span>
          </a>
        </div>

        <div class="flex items-center gap-3">
          <!-- Search (decorative) -->
          <button class="p-2 text-gray-500 hover:text-brand-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          </button>
          <!-- Favorites (decorative) -->
          <button class="p-2 text-gray-500 hover:text-brand-600 transition-colors hidden sm:block">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
          </button>
          <!-- Cart (decorative) -->
          <button class="p-2 text-gray-500 hover:text-brand-600 transition-colors relative">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <span class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-brand-600 text-white text-[10px] font-bold rounded-full flex items-center justify-center">0</span>
          </button>
          <!-- Mobile menu -->
          <button class="lg:hidden p-2 text-gray-500" onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      <!-- Nav row -->
      <nav id="desktop-nav" class="hidden lg:flex items-center gap-1 -mb-px h-10"></nav>
    </div>
    <!-- Mobile menu -->
    <div id="mobile-menu" class="hidden lg:hidden border-t border-gray-100 bg-white">
      <div id="mobile-nav" class="max-w-7xl mx-auto px-4 py-3 flex flex-col gap-2"></div>
    </div>
  </header>

  <!-- Breadcrumb + Title -->
  <section class="bg-gray-50 border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-4 lg:px-8 py-6 lg:py-10">
      <div class="text-xs text-gray-400 mb-3">
        <a href="#" class="hover:text-brand-600">Главная</a> <span class="mx-1">/</span> <span class="text-gray-600">Каталог</span>
      </div>
      <h1 id="catalog-title" class="text-xl lg:text-3xl font-bold text-gray-900 tracking-tight uppercase"></h1>
      <p id="catalog-subtitle" class="mt-2 text-sm text-gray-400 max-w-xl"></p>
    </div>
  </section>

  <!-- Filters + Products -->
  <section class="max-w-7xl mx-auto px-4 lg:px-8 py-8">
    <!-- Filter bar -->
    <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
      <div id="filter-bar" class="flex gap-2 flex-wrap"></div>
      <span id="product-count" class="text-xs text-gray-400"></span>
    </div>
    <!-- Product Grid -->
    <div id="products-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-x-4 gap-y-8"></div>
  </section>

  <!-- Advantages strip -->
  <section class="border-t border-gray-100">
    <div id="advantages" class="max-w-7xl mx-auto px-4 lg:px-8 py-8 grid grid-cols-2 lg:grid-cols-4 gap-6"></div>
  </section>

  <!-- SEO text -->
  <section class="bg-gray-50 border-t border-gray-100">
    <div class="max-w-7xl mx-auto px-4 lg:px-8 py-10">
      <h2 id="seo-title" class="text-base font-semibold text-gray-900 mb-3"></h2>
      <p id="seo-text" class="text-sm text-gray-500 leading-relaxed max-w-3xl"></p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-gray-900 text-gray-400">
    <div class="max-w-7xl mx-auto px-4 lg:px-8 py-10 lg:py-14">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
        <!-- Col 1: Logo + about -->
        <div class="md:col-span-2">
          <img id="footer-logo" alt="НеХалат" class="h-8 brightness-0 invert mb-4" />
          <p id="footer-about" class="text-sm leading-relaxed max-w-sm"></p>
        </div>
        <!-- Col 2: Каталог -->
        <div>
          <h4 class="text-sm font-semibold text-white mb-3 uppercase tracking-wider">Каталог</h4>
          <ul id="footer-catalog" class="space-y-2 text-sm"></ul>
        </div>
        <!-- Col 3: Контакты -->
        <div>
          <h4 class="text-sm font-semibold text-white mb-3 uppercase tracking-wider">Контакты</h4>
          <ul class="space-y-2 text-sm">
            <li id="footer-phone"></li>
            <li id="footer-email"></li>
          </ul>
          <div class="flex gap-3 mt-4">
            <a id="footer-ig" href="#" class="w-8 h-8 rounded-full bg-gray-800 flex items-center justify-center text-gray-400 hover:bg-brand-600 hover:text-white transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
            </a>
            <a id="footer-wa" href="#" class="w-8 h-8 rounded-full bg-gray-800 flex items-center justify-center text-gray-400 hover:bg-brand-600 hover:text-white transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
            </a>
          </div>
        </div>
      </div>
      <div class="border-t border-gray-800 mt-8 pt-6 flex flex-col sm:flex-row items-center justify-between gap-3 text-xs text-gray-500">
        <span id="footer-copy"></span>
        <a href="privacy.html" class="hover:text-white transition-colors">Политика конфиденциальности</a>
      </div>
    </div>
  </footer>

  <script src="content.js?v=20260329"></script>
  <script>
    if (typeof SITE_CONTENT === 'undefined') {
      document.body.innerHTML = '<div style="text-align:center;padding:80px 20px;font-family:sans-serif"><h2>Ошибка загрузки контента</h2><p>Файл content.js не загрузился. Проверьте, что он лежит рядом с index.html на хостинге.</p></div>';
      throw new Error('SITE_CONTENT not defined');
    }
    const C = SITE_CONTENT;

    /* --- Banner --- */
    const bannerEl = document.getElementById('top-banner');
    if (C.banner && C.banner.show) { bannerEl.textContent = C.banner.text; }
    else { bannerEl.style.display = 'none'; }

    /* --- Header --- */
    document.getElementById('header-logo').src = C.logo;
    document.getElementById('phone-text').textContent = C.phone;
    document.getElementById('header-phone').href = 'tel:' + C.phone.replace(/[^+\d]/g, '');

    /* --- Nav --- */
    const activeFilter = { current: 'all' };
    function buildNav() {
      const desktop = document.getElementById('desktop-nav');
      const mobile = document.getElementById('mobile-nav');
      const allBtn = `<button onclick="filterProducts('all')" data-f="all" class="nav-link px-3 py-2 text-xs font-medium uppercase tracking-wider border-b-2 border-brand-600 text-brand-600">Все</button>`;
      const links = C.navLinks.map(l =>
        `<button onclick="filterProducts('${l.filter}')" data-f="${l.filter}" class="nav-link px-3 py-2 text-xs font-medium uppercase tracking-wider border-b-2 border-transparent text-gray-500 hover:text-brand-600 transition-colors">${l.label}</button>`
      ).join('');
      desktop.innerHTML = allBtn + links;
      mobile.innerHTML = `<button onclick="filterProducts('all')" data-f="all" class="nav-link-m text-sm font-medium py-1 text-brand-600">Все</button>` +
        C.navLinks.map(l => `<button onclick="filterProducts('${l.filter}')" data-f="${l.filter}" class="nav-link-m text-sm py-1 text-gray-500 hover:text-brand-600">${l.label}</button>`).join('');
    }
    buildNav();

    /* --- Catalog title --- */
    document.getElementById('catalog-title').textContent = C.catalogTitle;
    document.getElementById('catalog-subtitle').textContent = C.catalogSubtitle;

    /* --- Products --- */
    function createCard(p) {
      const badge = p.badge ? `<span class="absolute top-2.5 left-2.5 z-10 px-2 py-0.5 text-[10px] font-semibold uppercase tracking-wider rounded ${p.badge==='SALE'?'bg-red-500 text-white':'bg-brand-600 text-white'}">${p.badge}</span>` : '';
      const oldP = p.oldPrice ? `<span class="text-xs text-gray-300 line-through ml-1">${p.oldPrice.toLocaleString('ru-RU')} ₽</span>` : '';
      const colors = p.colors.map(c => `<span class="color-dot" style="background:${c}"></span>`).join('');
      const img = p.image || 'https://placehold.co/400x530/f2f2f2/aaa?text=' + encodeURIComponent(p.name.replace(/[«»]/g,'')) + '&font=roboto';
      return `<div class="group">
        <div class="relative aspect-[3/4] rounded-lg overflow-hidden bg-gray-100 mb-3">
          ${badge}
          <img src="${img}" alt="${p.name}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" loading="lazy"/>
          <div class="card-overlay absolute inset-0 bg-black/20 flex items-end justify-center pb-5">
            <button class="buy-btn px-6 py-2.5 bg-brand-600 text-white text-xs font-semibold rounded hover:bg-brand-700 transition-colors tracking-wide uppercase" data-product="${p.name}" data-price="${p.price}">Купить</button>
          </div>
        </div>
        <div class="flex gap-1 mb-1.5">${colors}</div>
        <h3 class="text-sm text-gray-800 leading-snug mb-1">${p.name}</h3>
        <div class="text-xs text-gray-400 mb-1.5">${p.sizes || ''}</div>
        <div class="flex items-baseline">
          <span class="text-sm font-semibold text-gray-900">${p.price.toLocaleString('ru-RU')} ₽</span>${oldP}
        </div>
      </div>`;
    }

    function renderProducts(filter) {
      const grid = document.getElementById('products-grid');
      let list = C.products;
      if (filter !== 'all') {
        list = C.products.filter(p => p.type === filter || (p.tags && p.tags.includes(filter)));
      }
      grid.innerHTML = list.map(createCard).join('');
      document.getElementById('product-count').textContent = list.length + ' ' + declProducts(list.length);
    }

    function declProducts(n) {
      const r = n % 10, r2 = n % 100;
      if (r2 >= 11 && r2 <= 14) return 'товаров';
      if (r === 1) return 'товар';
      if (r >= 2 && r <= 4) return 'товара';
      return 'товаров';
    }

    function filterProducts(f) {
      activeFilter.current = f;
      document.querySelectorAll('.nav-link').forEach(b => {
        const active = b.dataset.f === f;
        b.className = 'nav-link px-3 py-2 text-xs font-medium uppercase tracking-wider border-b-2 transition-colors ' +
          (active ? 'border-brand-600 text-brand-600' : 'border-transparent text-gray-500 hover:text-brand-600');
      });
      document.querySelectorAll('.nav-link-m').forEach(b => {
        b.className = 'nav-link-m text-sm py-1 ' + (b.dataset.f === f ? 'font-medium text-brand-600' : 'text-gray-500 hover:text-brand-600');
      });

      /* filter bar buttons */
      document.querySelectorAll('.fbtn').forEach(b => {
        b.className = 'fbtn px-3 py-1.5 text-xs rounded-full transition-all ' +
          (b.dataset.f === f ? 'bg-brand-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200');
      });

      renderProducts(f);
      document.getElementById('mobile-menu').classList.add('hidden');
    }

    /* Filter bar */
    document.getElementById('filter-bar').innerHTML =
      `<button onclick="filterProducts('all')" data-f="all" class="fbtn px-3 py-1.5 text-xs rounded-full bg-brand-600 text-white">Все</button>` +
      C.navLinks.map(l => `<button onclick="filterProducts('${l.filter}')" data-f="${l.filter}" class="fbtn px-3 py-1.5 text-xs rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200">${l.label}</button>`).join('');

    renderProducts('all');

    /* --- Advantages --- */
    const iconMap = {
      truck: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M15 18H9"/><path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14"/><circle cx="17" cy="18" r="2"/><circle cx="7" cy="18" r="2"/></svg>',
      shield: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>',
      star: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
      clock: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
    };
    document.getElementById('advantages').innerHTML = C.advantages.map(a => `
      <div class="flex items-start gap-3">
        <div class="text-brand-600 shrink-0 mt-0.5">${iconMap[a.icon] || iconMap.star}</div>
        <div>
          <div class="text-sm font-medium text-gray-900">${a.title}</div>
          <div class="text-xs text-gray-400">${a.text}</div>
        </div>
      </div>
    `).join('');

    /* --- SEO --- */
    document.getElementById('seo-title').textContent = C.seoTitle;
    document.getElementById('seo-text').textContent = C.seoText;

    /* --- Footer --- */
    document.getElementById('footer-logo').src = C.logo;
    document.getElementById('footer-about').textContent = C.footerAbout;
    document.getElementById('footer-phone').textContent = C.contactPhone;
    document.getElementById('footer-email').textContent = C.contactEmail;
    document.getElementById('footer-ig').href = C.instagramUrl;
    document.getElementById('footer-wa').href = C.whatsappUrl;
    document.getElementById('footer-copy').textContent = C.copyright;
    document.getElementById('footer-catalog').innerHTML = C.navLinks.map(l =>
      `<li><a href="#" onclick="filterProducts('${l.filter}');window.scrollTo(0,0);return false" class="hover:text-white transition-colors">${l.label}</a></li>`
    ).join('');
  </script>

</body>
</html>
